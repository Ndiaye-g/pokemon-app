<div class="container" *ngIf="pokemon">
  <button class="back-btn" (click)="goBack()">← Indietro</button>
  <h2>{{ pokemon.name | uppercase }}</h2>
  <img [src]="pokemon.sprites.front_default" [alt]="pokemon.name">
  <div class="info">
    <p><strong>ID:</strong> {{ pokemon.id }}</p>
    <p><strong>Altezza:</strong> {{ pokemon.height }}</p>
    <p><strong>Peso:</strong> {{ pokemon.weight }}</p>
    <p><strong>Tipi:</strong> 
      <span *ngFor="let t of pokemon.types">{{ t.type.name }} </span>
    </p>
  </div>
</div>

<div *ngIf="!pokemon">
  <p>Caricamento...</p>
</div>
